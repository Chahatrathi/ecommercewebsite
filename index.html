<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Official Store</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --bg: #000; --accent: #fff; --green: #00ff88; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Arial; overflow-x: hidden; }

        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px 40px; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .logo { font-weight: 900; letter-spacing: 8px; cursor: pointer; }
        .nav-links { display: flex; gap: 15px; font-size: 9px; letter-spacing: 2px; align-items: center; }
        .nav-links a { cursor: pointer; opacity: 0.6; text-transform: uppercase; color: #fff; text-decoration: none; }
        
        .page { display: none; min-height: 100vh; width: 100%; padding: 100px 30px; }
        .page.active { display: block; }

        /* CENTERED CONTACT LAYOUT */
        #contact-page { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #contact-page.active { display: flex; }

        #hero-canvas { position: fixed; inset: 0; z-index: -1; filter: brightness(0.4); }
        .marquee-content { display: flex; width: 200%; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .card { flex: 0 0 280px; height: 400px; margin: 0 10px; background: #111; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #222; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .glass-box { background: #0a0a0a; padding: 30px; width: 90%; max-width: 400px; border: 1px solid #222; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #222; color: #fff; outline: none; }
        .btn-prime { width: 100%; padding: 14px; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; }
        
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); display: inline-block; margin-left: 5px; }
        .online { background: var(--green) !important; box-shadow: 0 0 8px var(--green); }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #fff; color: #000; padding: 10px 20px; display: none; z-index: 6000; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast">MESSAGE</div>

    <nav>
        <div class="logo" onclick="showPage('home-page')">ELITE</div>
        <div class="nav-links">
            <a onclick="showPage('home-page')">Home</a>
            <a onclick="showPage('feed-page')">Feed</a>
            <a onclick="showPage('contact-page')">Contact</a>
            <a id="profile-btn" onclick="showPage('profile-page')" style="display:none;">Profile</a>
            <a id="auth-trigger" onclick="openAuth('LOGIN')">Account<span id="status-dot" class="status-dot"></span></a>
        </div>
    </nav>

    <canvas id="hero-canvas"></canvas>

    <div id="home-page" class="page active" style="padding:0; display:flex; flex-direction:column; justify-content:center;">
        <div style="height:70vh; display:flex; align-items:center; justify-content:center;">
            <h1 style="font-size:18vw; font-weight:900;">ELITE</h1>
        </div>
        <div class="marquee-content">
            <div class="card"><h3>TEE</h3><p>$85</p><button class="btn-prime" onclick="showToast('ADDED TO CART')">BUY</button></div>
            <div class="card"><h3>HOODIE</h3><p>$120</p><button class="btn-prime" onclick="showToast('ADDED TO CART')">BUY</button></div>
            <div class="card"><h3>CARGO</h3><p>$180</p><button class="btn-prime" onclick="showToast('ADDED TO CART')">BUY</button></div>
        </div>
    </div>

    <div id="contact-page" class="page">
        <h1 style="letter-spacing:10px; margin-bottom:20px;">CONTACT</h1>
        <div style="width:100%; max-width:400px;">
            <input type="text" id="c-name" placeholder="NAME">
            <textarea id="c-msg" rows="4" placeholder="MESSAGE"></textarea>
            <button class="btn-prime" onclick="handleContact()">SEND</button>
        </div>
    </div>

    <div id="auth-overlay" class="overlay">
        <div class="glass-box">
            <h2 id="auth-title" style="margin-bottom:20px;">LOGIN</h2>
            <div id="auth-form-fields"></div>
            <button id="auth-btn" class="btn-prime" onclick="submitAuth()">PROCEED</button>
            <p onclick="switchAuthMode()" style="font-size:10px; margin-top:15px; cursor:pointer; opacity:0.5;">OR SWITCH MODE</p>
            <p onclick="document.getElementById('auth-overlay').style.display='none'" style="font-size:10px; margin-top:10px; cursor:pointer;">CLOSE</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://ecommercewebsite-diea.onrender.com/api";
        let loggedUser = null;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openAuth(mode) {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('auth-title').innerText = mode;
            const fields = document.getElementById('auth-form-fields');
            fields.innerHTML = mode === 'SIGNUP' ? 
                `<input id="a-name" placeholder="NAME"><input id="a-email" placeholder="EMAIL"><input type="password" id="a-pass" placeholder="PASS">` :
                `<input id="a-email" placeholder="EMAIL"><input type="password" id="a-pass" placeholder="PASS">`;
        }

        async function submitAuth() {
            const btn = document.getElementById('auth-btn');
            const email = document.getElementById('a-email').value;
            const pass = document.getElementById('a-pass').value;
            const mode = document.getElementById('auth-title').innerText.toLowerCase();

            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/${mode}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password: pass, fullName: document.getElementById('a-name')?.value })
                });
                const data = await res.json();
                if(res.ok) {
                    loggedUser = data.user;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('auth-trigger').innerText = loggedUser.name.toUpperCase();
                    showToast("SUCCESS");
                } else { alert(data.error); }
            } catch(e) { alert("Server is waking up. Try again in 20 seconds."); }
            btn.innerText = "PROCEED"; btn.disabled = false;
        }

        function handleContact() {
            const name = document.getElementById('c-name').value;
            if(name) showToast(`SENT: THANK YOU ${name.toUpperCase()}`);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        // --- CANVAS ANIMATION ---
        const canvas = document.getElementById("hero-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const images = [];
        for(let i=1; i<=50; i++) {
            const img = new Image();
            img.src = `frames/${i.toString().padStart(2, '0')}.jpg`;
            images.push(img);
        }
        let idx = 0;
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const currentImg = images[Math.floor(idx % 50)];
            if(currentImg?.complete) ctx.drawImage(currentImg, 0, 0, canvas.width, canvas.height);
            idx += 0.15; requestAnimationFrame(anim);
        }
        images[0].onload = anim;
    </script>
</body>
</html>
